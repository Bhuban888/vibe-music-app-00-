name: Build Vibe Music APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create full project structure
        run: |
          mkdir -p app/src/main/java/com/vibemusic
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper

      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'ENDOFFILE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "VibeMusic"
          include ':app'
          ENDOFFILE

      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'ENDOFFILE'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          ENDOFFILE

      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'ENDOFFILE'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.vibemusic'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vibemusic"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.media:media:1.7.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
          }
          ENDOFFILE

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
              <application
                  android:allowBackup="true"
                  android:label="Vibe Music"
                  android:theme="@style/AppTheme"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".PlayerActivity" android:exported="false"/>
                  <service
                      android:name=".MusicService"
                      android:exported="false"
                      android:foregroundServiceType="mediaPlayback"/>
              </application>
          </manifest>
          ENDOFFILE

      - name: Write Song.java
        run: |
          cat > app/src/main/java/com/vibemusic/Song.java << 'ENDOFFILE'
          package com.vibemusic;
          import java.io.Serializable;
          public class Song implements Serializable {
              public String title;
              public String artist;
              public String thumbnail;
              public String videoId;
              public String streamUrl;
              public Song(String title, String artist, String thumbnail, String videoId) {
                  this.title = title;
                  this.artist = artist;
                  this.thumbnail = thumbnail;
                  this.videoId = videoId;
              }
          }
          ENDOFFILE

      - name: Write YouTubeHelper.java
        run: |
          cat > app/src/main/java/com/vibemusic/YouTubeHelper.java << 'ENDOFFILE'
          package com.vibemusic;
          import android.util.Log;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.net.URLEncoder;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;
          public class YouTubeHelper {
              private static final String TAG = "YouTubeHelper";
              public interface SearchCallback {
                  void onResults(List<Song> songs);
                  void onError(String error);
              }
              public interface StreamCallback {
                  void onStream(String url);
                  void onError(String error);
              }
              public static void search(String query, SearchCallback callback) {
                  new Thread(() -> {
                      try {
                          String encoded = URLEncoder.encode(query + " audio", "UTF-8");
                          URL url = new URL("https://www.youtube.com/results?search_query=" + encoded + "&sp=EgIQAQ%253D%253D");
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestProperty("User-Agent", "Mozilla/5.0 (Android 14; Mobile)");
                          conn.setRequestProperty("Accept-Language", "en-US,en;q=0.9");
                          BufferedReader reader = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                          StringBuilder sb = new StringBuilder();
                          String line;
                          while ((line = reader.readLine()) != null) sb.append(line);
                          String html = sb.toString();
                          List<Song> songs = new ArrayList<>();
                          Pattern jsonPattern = Pattern.compile("var ytInitialData = (\\{.+?\\});</script>");
                          Matcher m = jsonPattern.matcher(html);
                          if (m.find()) {
                              JSONObject data = new JSONObject(m.group(1));
                              JSONArray contents = data
                                  .getJSONObject("contents")
                                  .getJSONObject("twoColumnSearchResultsRenderer")
                                  .getJSONObject("primaryContents")
                                  .getJSONObject("sectionListRenderer")
                                  .getJSONArray("contents")
                                  .getJSONObject(0)
                                  .getJSONObject("itemSectionRenderer")
                                  .getJSONArray("contents");
                              for (int i = 0; i < contents.length() && songs.size() < 20; i++) {
                                  try {
                                      JSONObject item = contents.getJSONObject(i);
                                      if (!item.has("videoRenderer")) continue;
                                      JSONObject v = item.getJSONObject("videoRenderer");
                                      String videoId = v.getString("videoId");
                                      String title = v.getJSONObject("title")
                                          .getJSONArray("runs").getJSONObject(0).getString("text");
                                      String artist = v.getJSONObject("ownerText")
                                          .getJSONArray("runs").getJSONObject(0).getString("text");
                                      String thumb = v.getJSONObject("thumbnail")
                                          .getJSONArray("thumbnails").getJSONObject(0).getString("url");
                                      songs.add(new Song(title, artist, thumb, videoId));
                                  } catch (Exception ignored) {}
                              }
                          }
                          callback.onResults(songs);
                      } catch (Exception e) {
                          callback.onError(e.getMessage());
                      }
                  }).start();
              }
              public static void getStreamUrl(String videoId, StreamCallback callback) {
                  new Thread(() -> {
                      try {
                          URL url = new URL("https://www.youtube.com/watch?v=" + videoId);
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestProperty("User-Agent", "Mozilla/5.0 (Android 14; Mobile)");
                          BufferedReader reader = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                          StringBuilder sb = new StringBuilder();
                          String line;
                          while ((line = reader.readLine()) != null) sb.append(line);
                          String html = sb.toString();
                          Pattern p = Pattern.compile("\"url\":\"(https://[^\"]+mime=audio[^\"]+)\"");
                          Matcher m = p.matcher(html);
                          if (m.find()) {
                              String streamUrl = m.group(1).replace("\\u0026", "&");
                              callback.onStream(streamUrl);
                          } else {
                              callback.onError("Stream not found");
                          }
                      } catch (Exception e) {
                          callback.onError(e.getMessage());
                      }
                  }).start();
              }
          }
          ENDOFFILE

      - name: Write SongAdapter.java
        run: |
          cat > app/src/main/java/com/vibemusic/SongAdapter.java << 'ENDOFFILE'
          package com.vibemusic;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.LayoutInflater;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ImageView;
          import android.widget.TextView;
          import androidx.annotation.NonNull;
          import androidx.recyclerview.widget.RecyclerView;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.List;
          public class SongAdapter extends RecyclerView.Adapter<SongAdapter.ViewHolder> {
              private List<Song> songs;
              private OnSongClick listener;
              public interface OnSongClick { void onClick(Song song); }
              public SongAdapter(List<Song> songs, OnSongClick listener) {
                  this.songs = songs;
                  this.listener = listener;
              }
              @NonNull @Override
              public ViewHolder onCreateViewHolder(@NonNull ViewGroup parent, int viewType) {
                  View v = LayoutInflater.from(parent.getContext()).inflate(R.layout.item_song, parent, false);
                  return new ViewHolder(v);
              }
              @Override
              public void onBindViewHolder(@NonNull ViewHolder h, int pos) {
                  Song s = songs.get(pos);
                  h.title.setText(s.title);
                  h.artist.setText(s.artist);
                  h.thumb.setImageResource(android.R.drawable.ic_media_play);
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(s.thumbnail).openConnection();
                          InputStream is = conn.getInputStream();
                          Bitmap bmp = BitmapFactory.decodeStream(is);
                          new Handler(Looper.getMainLooper()).post(() -> h.thumb.setImageBitmap(bmp));
                      } catch (Exception ignored) {}
                  }).start();
                  h.itemView.setOnClickListener(v -> listener.onClick(s));
              }
              @Override public int getItemCount() { return songs.size(); }
              public void updateSongs(List<Song> newSongs) { songs = newSongs; notifyDataSetChanged(); }
              static class ViewHolder extends RecyclerView.ViewHolder {
                  ImageView thumb; TextView title, artist;
                  ViewHolder(View v) {
                      super(v);
                      thumb = v.findViewById(R.id.iv_thumb);
                      title = v.findViewById(R.id.tv_title);
                      artist = v.findViewById(R.id.tv_artist);
                  }
              }
          }
          ENDOFFILE

      - name: Write MusicService.java
        run: |
          cat > app/src/main/java/com/vibemusic/MusicService.java << 'ENDOFFILE'
          package com.vibemusic;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.media.AudioAttributes;
          import android.media.MediaPlayer;
          import android.os.Binder;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;
          public class MusicService extends Service {
              public static final String CHANNEL_ID = "vibe_music_channel";
              private MediaPlayer mediaPlayer;
              private Song currentSong;
              private final IBinder binder = new MusicBinder();
              public class MusicBinder extends Binder {
                  public MusicService getService() { return MusicService.this; }
              }
              @Override public IBinder onBind(Intent intent) { return binder; }
              @Override
              public void onCreate() {
                  super.onCreate();
                  createNotificationChannel();
              }
              public void play(Song song, String streamUrl) {
                  currentSong = song;
                  if (mediaPlayer != null) { mediaPlayer.stop(); mediaPlayer.release(); }
                  mediaPlayer = new MediaPlayer();
                  mediaPlayer.setAudioAttributes(new AudioAttributes.Builder()
                      .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                      .setUsage(AudioAttributes.USAGE_MEDIA).build());
                  try {
                      mediaPlayer.setDataSource(streamUrl);
                      mediaPlayer.prepareAsync();
                      mediaPlayer.setOnPreparedListener(mp -> mp.start());
                  } catch (Exception e) { e.printStackTrace(); }
                  startForeground(1, buildNotification(song));
              }
              public void pauseResume() {
                  if (mediaPlayer == null) return;
                  if (mediaPlayer.isPlaying()) mediaPlayer.pause();
                  else mediaPlayer.start();
              }
              public boolean isPlaying() { return mediaPlayer != null && mediaPlayer.isPlaying(); }
              public Song getCurrentSong() { return currentSong; }
              public int getCurrentPosition() { return mediaPlayer != null ? mediaPlayer.getCurrentPosition() : 0; }
              public int getDuration() { return mediaPlayer != null ? mediaPlayer.getDuration() : 0; }
              private Notification buildNotification(Song song) {
                  Intent intent = new Intent(this, PlayerActivity.class);
                  PendingIntent pi = PendingIntent.getActivity(this, 0, intent, PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle(song.title)
                      .setContentText(song.artist)
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setContentIntent(pi)
                      .setOngoing(true)
                      .build();
              }
              private void createNotificationChannel() {
                  NotificationChannel ch = new NotificationChannel(CHANNEL_ID, "Vibe Music", NotificationManager.IMPORTANCE_LOW);
                  getSystemService(NotificationManager.class).createNotificationChannel(ch);
              }
              @Override
              public void onDestroy() {
                  if (mediaPlayer != null) { mediaPlayer.release(); mediaPlayer = null; }
                  super.onDestroy();
              }
          }
          ENDOFFILE

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/vibemusic/MainActivity.java << 'ENDOFFILE'
          package com.vibemusic;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.content.ServiceConnection;
          import android.os.Bundle;
          import android.os.IBinder;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.inputmethod.EditorInfo;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.ImageButton;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import androidx.recyclerview.widget.RecyclerView;
          import java.util.ArrayList;
          import java.util.List;
          public class MainActivity extends AppCompatActivity {
              private EditText etSearch;
              private ProgressBar progressSearch;
              private TextView tvEmpty;
              private RecyclerView rvSongs;
              private SongAdapter adapter;
              private List<Song> songList = new ArrayList<>();
              private LinearLayout miniPlayer;
              private ImageView ivMiniThumb;
              private TextView tvMiniTitle, tvMiniArtist;
              private ImageButton btnMiniPlayPause;
              private MusicService musicService;
              private boolean bound = false;
              private ServiceConnection connection = new ServiceConnection() {
                  public void onServiceConnected(ComponentName n, IBinder b) {
                      musicService = ((MusicService.MusicBinder) b).getService();
                      bound = true;
                      updateMiniPlayer();
                  }
                  public void onServiceDisconnected(ComponentName n) { bound = false; }
              };
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  etSearch = findViewById(R.id.et_search);
                  progressSearch = findViewById(R.id.progress_search);
                  tvEmpty = findViewById(R.id.tv_empty_state);
                  rvSongs = findViewById(R.id.rv_songs);
                  miniPlayer = findViewById(R.id.mini_player);
                  ivMiniThumb = findViewById(R.id.iv_mini_thumb);
                  tvMiniTitle = findViewById(R.id.tv_mini_title);
                  tvMiniArtist = findViewById(R.id.tv_mini_artist);
                  btnMiniPlayPause = findViewById(R.id.btn_mini_play_pause);
                  Button btnSearch = findViewById(R.id.btn_search);
                  adapter = new SongAdapter(songList, song -> playSong(song));
                  rvSongs.setLayoutManager(new LinearLayoutManager(this));
                  rvSongs.setAdapter(adapter);
                  btnSearch.setOnClickListener(v -> doSearch());
                  etSearch.setOnEditorActionListener((v, actionId, event) -> {
                      if (actionId == EditorInfo.IME_ACTION_SEARCH) { doSearch(); return true; }
                      return false;
                  });
                  btnMiniPlayPause.setOnClickListener(v -> {
                      if (bound) { musicService.pauseResume(); updateMiniPlayer(); }
                  });
                  miniPlayer.setOnClickListener(v -> {
                      if (bound && musicService.getCurrentSong() != null) {
                          Intent i = new Intent(this, PlayerActivity.class);
                          startActivity(i);
                      }
                  });
                  Intent serviceIntent = new Intent(this, MusicService.class);
                  startService(serviceIntent);
                  bindService(serviceIntent, connection, BIND_AUTO_CREATE);
              }
              private void doSearch() {
                  String q = etSearch.getText().toString().trim();
                  if (q.isEmpty()) { Toast.makeText(this, "Enter a search term", Toast.LENGTH_SHORT).show(); return; }
                  InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                  imm.hideSoftInputFromWindow(etSearch.getWindowToken(), 0);
                  progressSearch.setVisibility(View.VISIBLE);
                  tvEmpty.setVisibility(View.GONE);
                  rvSongs.setVisibility(View.GONE);
                  YouTubeHelper.search(q, new YouTubeHelper.SearchCallback() {
                      public void onResults(List<Song> songs) {
                          runOnUiThread(() -> {
                              progressSearch.setVisibility(View.GONE);
                              if (songs.isEmpty()) {
                                  tvEmpty.setText("No results found. Try another search.");
                                  tvEmpty.setVisibility(View.VISIBLE);
                              } else {
                                  songList.clear(); songList.addAll(songs);
                                  adapter.updateSongs(songList);
                                  rvSongs.setVisibility(View.VISIBLE);
                              }
                          });
                      }
                      public void onError(String error) {
                          runOnUiThread(() -> {
                              progressSearch.setVisibility(View.GONE);
                              tvEmpty.setText("Search failed. Check internet connection.");
                              tvEmpty.setVisibility(View.VISIBLE);
                              Toast.makeText(MainActivity.this, "Error: " + error, Toast.LENGTH_LONG).show();
                          });
                      }
                  });
              }
              private void playSong(Song song) {
                  Toast.makeText(this, "Loading: " + song.title, Toast.LENGTH_SHORT).show();
                  YouTubeHelper.getStreamUrl(song.videoId, new YouTubeHelper.StreamCallback() {
                      public void onStream(String url) {
                          song.streamUrl = url;
                          if (bound) {
                              musicService.play(song, url);
                              runOnUiThread(() -> {
                                  updateMiniPlayer();
                                  Intent i = new Intent(MainActivity.this, PlayerActivity.class);
                                  startActivity(i);
                              });
                          }
                      }
                      public void onError(String error) {
                          runOnUiThread(() -> Toast.makeText(MainActivity.this, "Can't play this song.", Toast.LENGTH_LONG).show());
                      }
                  });
              }
              private void updateMiniPlayer() {
                  if (!bound || musicService.getCurrentSong() == null) { miniPlayer.setVisibility(View.GONE); return; }
                  Song s = musicService.getCurrentSong();
                  miniPlayer.setVisibility(View.VISIBLE);
                  tvMiniTitle.setText(s.title);
                  tvMiniArtist.setText(s.artist);
                  btnMiniPlayPause.setImageResource(musicService.isPlaying() ?
                      android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play);
              }
              @Override protected void onDestroy() { if (bound) { unbindService(connection); bound = false; } super.onDestroy(); }
          }
          ENDOFFILE

      - name: Write PlayerActivity.java
        run: |
          cat > app/src/main/java/com/vibemusic/PlayerActivity.java << 'ENDOFFILE'
          package com.vibemusic;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.content.ServiceConnection;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.widget.ImageButton;
          import android.widget.SeekBar;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          public class PlayerActivity extends AppCompatActivity {
              private TextView tvTitle, tvArtist, tvCurrent, tvTotal;
              private SeekBar seekBar;
              private ImageButton btnPlayPause, btnBack;
              private MusicService musicService;
              private boolean bound = false;
              private Handler handler = new Handler(Looper.getMainLooper());
              private ServiceConnection connection = new ServiceConnection() {
                  public void onServiceConnected(ComponentName n, IBinder b) {
                      musicService = ((MusicService.MusicBinder) b).getService();
                      bound = true;
                      updateUI();
                      startProgressUpdater();
                  }
                  public void onServiceDisconnected(ComponentName n) { bound = false; }
              };
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_player);
                  tvTitle = findViewById(R.id.tv_player_title);
                  tvArtist = findViewById(R.id.tv_player_artist);
                  tvCurrent = findViewById(R.id.tv_current);
                  tvTotal = findViewById(R.id.tv_total);
                  seekBar = findViewById(R.id.seek_bar);
                  btnPlayPause = findViewById(R.id.btn_play_pause);
                  btnBack = findViewById(R.id.btn_back);
                  btnBack.setOnClickListener(v -> finish());
                  btnPlayPause.setOnClickListener(v -> {
                      if (bound) { musicService.pauseResume(); updateUI(); }
                  });
                  Intent serviceIntent = new Intent(this, MusicService.class);
                  bindService(serviceIntent, connection, BIND_AUTO_CREATE);
              }
              private void updateUI() {
                  if (!bound || musicService.getCurrentSong() == null) return;
                  Song s = musicService.getCurrentSong();
                  tvTitle.setText(s.title);
                  tvArtist.setText(s.artist);
                  btnPlayPause.setImageResource(musicService.isPlaying() ?
                      android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play);
              }
              private void startProgressUpdater() {
                  handler.post(new Runnable() {
                      public void run() {
                          if (bound && musicService != null) {
                              int pos = musicService.getCurrentPosition();
                              int dur = musicService.getDuration();
                              if (dur > 0) {
                                  seekBar.setMax(dur);
                                  seekBar.setProgress(pos);
                                  tvCurrent.setText(formatTime(pos));
                                  tvTotal.setText(formatTime(dur));
                              }
                          }
                          handler.postDelayed(this, 500);
                      }
                  });
              }
              private String formatTime(int ms) {
                  int s = ms / 1000;
                  return String.format("%d:%02d", s / 60, s % 60);
              }
              @Override protected void onDestroy() {
                  handler.removeCallbacksAndMessages(null);
                  if (bound) { unbindService(connection); bound = false; }
                  super.onDestroy();
              }
          }
          ENDOFFILE

      - name: Write layouts
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#0F0F0F">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="🎵 Vibe Music" android:textColor="#FFFFFF" android:textSize="22sp"
                  android:textStyle="bold" android:padding="20dp"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="horizontal" android:paddingLeft="16dp"
                  android:paddingRight="16dp" android:paddingBottom="12dp" android:gravity="center_vertical">
                  <EditText android:id="@+id/et_search" android:layout_width="0dp"
                      android:layout_height="48dp" android:layout_weight="1"
                      android:hint="Search songs, artists..." android:textColor="#FFFFFF"
                      android:textColorHint="#888888" android:background="@drawable/search_bg"
                      android:paddingLeft="16dp" android:paddingRight="16dp"
                      android:imeOptions="actionSearch" android:inputType="text"
                      android:singleLine="true" android:textSize="15sp"/>
                  <Button android:id="@+id/btn_search" android:layout_width="wrap_content"
                      android:layout_height="48dp" android:layout_marginLeft="8dp"
                      android:text="Search" android:textColor="#000000"
                      android:backgroundTint="#1DB954" android:textStyle="bold"/>
              </LinearLayout>
              <ProgressBar android:id="@+id/progress_search" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:layout_gravity="center_horizontal"
                  android:indeterminateTint="#1DB954" android:visibility="gone"/>
              <TextView android:id="@+id/tv_empty_state" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:text="Search for your favourite music"
                  android:textColor="#888888" android:textSize="15sp"
                  android:gravity="center" android:padding="32dp"/>
              <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_songs"
                  android:layout_width="match_parent" android:layout_height="0dp"
                  android:layout_weight="1" android:visibility="gone"/>
              <LinearLayout android:id="@+id/mini_player" android:layout_width="match_parent"
                  android:layout_height="72dp" android:orientation="horizontal"
                  android:background="#1A1A1A" android:gravity="center_vertical"
                  android:paddingLeft="12dp" android:paddingRight="12dp" android:visibility="gone">
                  <ImageView android:id="@+id/iv_mini_thumb" android:layout_width="48dp"
                      android:layout_height="48dp" android:scaleType="centerCrop"/>
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                      android:layout_weight="1" android:orientation="vertical"
                      android:paddingLeft="12dp" android:paddingRight="12dp">
                      <TextView android:id="@+id/tv_mini_title" android:layout_width="match_parent"
                          android:layout_height="wrap_content" android:textColor="#FFFFFF"
                          android:textSize="14sp" android:textStyle="bold"
                          android:maxLines="1" android:ellipsize="end"/>
                      <TextView android:id="@+id/tv_mini_artist" android:layout_width="match_parent"
                          android:layout_height="wrap_content" android:textColor="#AAAAAA"
                          android:textSize="12sp" android:maxLines="1" android:ellipsize="end"/>
                  </LinearLayout>
                  <ImageButton android:id="@+id/btn_mini_play_pause" android:layout_width="44dp"
                      android:layout_height="44dp" android:src="@android:drawable/ic_media_play"
                      android:background="?attr/selectableItemBackgroundBorderless"
                      android:tint="#FFFFFF"/>
              </LinearLayout>
          </LinearLayout>
          ENDOFFILE

          cat > app/src/main/res/layout/activity_player.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#0F0F0F"
              android:gravity="center_horizontal" android:padding="24dp">
              <ImageButton android:id="@+id/btn_back" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:layout_gravity="start"
                  android:src="@android:drawable/ic_media_rew"
                  android:background="?attr/selectableItemBackgroundBorderless"
                  android:tint="#FFFFFF"/>
              <View android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"/>
              <ImageView android:id="@+id/iv_album_art" android:layout_width="240dp"
                  android:layout_height="240dp" android:scaleType="centerCrop"
                  android:src="@android:drawable/ic_media_play"
                  android:background="#1A1A1A"/>
              <TextView android:id="@+id/tv_player_title" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:textColor="#FFFFFF"
                  android:textSize="20sp" android:textStyle="bold"
                  android:gravity="center" android:layout_marginTop="24dp"
                  android:maxLines="2" android:ellipsize="end"/>
              <TextView android:id="@+id/tv_player_artist" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:textColor="#AAAAAA"
                  android:textSize="16sp" android:gravity="center" android:layout_marginTop="8dp"/>
              <SeekBar android:id="@+id/seek_bar" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:layout_marginTop="32dp"
                  android:progressTint="#1DB954" android:thumbTint="#1DB954"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="horizontal" android:layout_marginTop="4dp">
                  <TextView android:id="@+id/tv_current" android:layout_width="0dp"
                      android:layout_height="wrap_content" android:layout_weight="1"
                      android:textColor="#888888" android:textSize="12sp" android:text="0:00"/>
                  <TextView android:id="@+id/tv_total" android:layout_width="wrap_content"
                      android:layout_height="wrap_content" android:textColor="#888888"
                      android:textSize="12sp" android:text="0:00"/>
              </LinearLayout>
              <ImageButton android:id="@+id/btn_play_pause" android:layout_width="72dp"
                  android:layout_height="72dp" android:layout_marginTop="24dp"
                  android:src="@android:drawable/ic_media_play"
                  android:backgroundTint="#1DB954" android:tint="#000000"/>
              <View android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"/>
          </LinearLayout>
          ENDOFFILE

          cat > app/src/main/res/layout/item_song.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="72dp"
              android:orientation="horizontal" android:gravity="center_vertical"
              android:paddingLeft="16dp" android:paddingRight="16dp"
              android:background="?attr/selectableItemBackground">
              <ImageView android:id="@+id/iv_thumb" android:layout_width="52dp"
                  android:layout_height="52dp" android:scaleType="centerCrop"
                  android:src="@android:drawable/ic_media_play"/>
              <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                  android:layout_weight="1" android:orientation="vertical"
                  android:paddingLeft="12dp" android:paddingRight="12dp">
                  <TextView android:id="@+id/tv_title" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:textColor="#FFFFFF"
                      android:textSize="15sp" android:textStyle="bold"
                      android:maxLines="1" android:ellipsize="end"/>
                  <TextView android:id="@+id/tv_artist" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:textColor="#AAAAAA"
                      android:textSize="13sp" android:maxLines="1" android:ellipsize="end"
                      android:layout_marginTop="2dp"/>
              </LinearLayout>
              <ImageView android:layout_width="24dp" android:layout_height="24dp"
                  android:src="@android:drawable/ic_media_play" android:tint="#1DB954"/>
          </LinearLayout>
          ENDOFFILE

      - name: Write resources
        run: |
          cat > app/src/main/res/values/colors.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1DB954</color>
              <color name="colorPrimaryDark">#158a3e</color>
              <color name="colorAccent">#1DB954</color>
              <color name="background">#0F0F0F</color>
          </resources>
          ENDOFFILE

          cat > app/src/main/res/values/strings.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Vibe Music</string>
          </resources>
          ENDOFFILE

          cat > app/src/main/res/values/themes.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
                  <item name="android:windowBackground">@color/background</item>
              </style>
          </resources>
          ENDOFFILE

          cat > app/src/main/res/drawable/search_bg.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <solid android:color="#1A1A1A"/>
              <corners android:radius="24dp"/>
              <stroke android:width="1dp" android:color="#333333"/>
          </shape>
          ENDOFFILE

      - name: Write gradle wrapper
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'ENDOFFILE'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          ENDOFFILE

          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.6-bin.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.6/bin/gradle wrapper --gradle-version=8.6 --project-dir .
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeMusicApp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
