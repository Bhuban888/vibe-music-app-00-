      - name: Write resources
        run: |
          cat > project/app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1DB954</color>
              <color name="colorPrimaryDark">#158a3e</color>
              <color name="colorAccent">#1DB954</color>
          </resources>
          XML

          cat > project/app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Vibe Music</string></resources>
          XML

          cat > project/app/src/main/res/values/themes.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
                  <item name="android:windowBackground">#0F0F0F</item>
                  <item name="android:statusBarColor">#0F0F0F</item>
              </style>
          </resources>
          XML

      - name: Build APK
        working-directory: project
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeMusic-APK
          path: project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
