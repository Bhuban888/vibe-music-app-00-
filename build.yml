name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Arrange files
        run: |
          mkdir -p app/src/main/java/com/vibemusic
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper
          cp AndroidManifest.xml app/src/main/AndroidManifest.xml
          cp MainActivity.java app/src/main/java/com/vibemusic/
          cp PlayerActivity.java app/src/main/java/com/vibemusic/
          cp MusicService.java app/src/main/java/com/vibemusic/
          cp SongAdapter.java app/src/main/java/com/vibemusic/
          cp YouTubeExtractor.java app/src/main/java/com/vibemusic/
          cp Song.java app/src/main/java/com/vibemusic/
          cp activity_main.xml app/src/main/res/layout/
          cp activity_player.xml app/src/main/res/layout/
          cp item_song.xml app/src/main/res/layout/
          cp colors.xml app/src/main/res/values/
          cp strings.xml app/src/main/res/values/
          cp themes.xml app/src/main/res/values/
          cp search_bg.xml app/src/main/res/drawable/
          cp play_button_bg.xml app/src/main/res/drawable/
          cp ic_launcher.xml app/src/main/res/drawable/
          cp gradle-wrapper.properties gradle/wrapper/
          cp build.gradle app/build.gradle
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeMusic-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
